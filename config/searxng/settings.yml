# Minimal SearXNG config for Researcher
# Enables JSON output format and disables the web UI rate limiter.

use_default_settings:
  engines:
    keep_only:
      - google
      - duckduckgo
      - bing
      - wikipedia

general:
  instance_name: "Researcher SearXNG"
  debug: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json   # Required — researcher uses the JSON API

server:
  secret_key: "researcher-local-secret-change-in-prod"
  limiter: false   # Disable rate limiting for local use
  image_proxy: false

outgoing:
  # Tor proxy for web-scraping engines (Google, DDG, Bing)
  # Prevents IP-based rate limits and CAPTCHAs
  proxies:
    all://:
      - socks5h://tor:9050
  using_tor_proxy: true

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
  - name: bing
    engine: bing
    shortcut: bi
    disabled: false
  # Brave Search API — no rate limits, no CAPTCHAs
  - name: braveapi
    engine: braveapi
    shortcut: brapi
    api_key: BSAJigmnkYhedoulk_jOMN96nfEoS47
    disabled: false
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

ui:
  default_theme: simple
  query_in_title: false
