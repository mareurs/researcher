# infra/docker-compose.yml
#
# Shared AI infrastructure stack — always-on, reusable across projects.
#
# GPU assignment:
#   NVIDIA RTX A5000  → llama-cpp (heavy model, device_ids: ["0"])
#   AMD RX 7800 XT    → llama-cpp-fast (fast model, /dev/kfd + /dev/dri via ROCm)
#   CPU               → tei-embed, tei-rerank, searxng
#
# TEI runs on CPU by design: neither TEI nor infinity have reliable Docker
# images for consumer RDNA3 GPUs. bge-large (~300MB) and the cross-encoder
# (~90MB) are fast enough on CPU (20-50ms/batch) for the research pipeline.
#
# Bring up:   docker compose up -d
# Tear down:  docker compose down
# (Use root Makefile: make infra-up / make infra-down)

networks:
  ai-infra-net:
    name: ai-infra-net    # pin name so external consumers don't need to know the project prefix
    driver: bridge

volumes:
  searxng-data:
  tei-embed-cache:
  tei-rerank-cache:

services:
  # ── Tor SOCKS proxy: anonymise web-scraping search engines ────────────────
  # SearXNG routes Google/DDG/Bing through this to avoid IP rate limits.
  # Brave API goes direct (API key auth, no scraping).
  tor:
    image: dperson/torproxy:latest
    container_name: tor
    networks:
      - ai-infra-net
    restart: unless-stopped

  # ── SearXNG: private metasearch (built from local source) ───────────────────
  # Source: ../searxng/ (cloned from github.com/searxng/searxng)
  # Rebuild after code changes: docker compose build searxng
  searxng:
    build:
      context: ../searxng
      dockerfile: Dockerfile.dev
    image: researcher-searxng:dev
    container_name: searxng
    networks:
      - ai-infra-net
    ports:
      - "4000:8080"
    volumes:
      - searxng-data:/etc/searxng
      - ../config/searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:4000/
    depends_on:
      - tor
    restart: unless-stopped

  # ── llama.cpp: OpenAI-compatible LLM, NVIDIA A5000 only ───────────────────
  # device_ids: ["0"] pins exclusively to the A5000 (GPU index 0).
  # Reusable: any project on ai-infra-net can point LLM_BASE_URL here.
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-cpp
    networks:
      - ai-infra-net
    ports:
      - "30080:8080"
    volumes:
      - ${LLAMA_MODELS_PATH:-/path/to/your/models}:/models:ro
    environment:
      - LLAMA_ARG_MODEL=/models/${LLAMA_MODEL:-bartowski/Qwen_Qwen3.5-27B-GGUF/Qwen_Qwen3.5-27B-Q4_K_M.gguf}
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
      - LLAMA_ARG_CTX_SIZE=${LLAMA_CTX_SIZE:-16384}
      - LLAMA_ARG_N_GPU_LAYERS=${LLAMA_GPU_LAYERS:-99}
      - LLAMA_ARG_PARALLEL=${LLAMA_PARALLEL:-2}
      - LLAMA_ARG_CONT_BATCHING=1
      - LLAMA_ARG_FLASH_ATTN=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]       # A5000 is GPU index 0
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ── llama.cpp fast: lightweight LLM on AMD RX 7800 XT via ROCm ────────────
  # Handles structured tasks (planner JSON, summarizer JSON) that don't need
  # a large model. Frees A5000 capacity for heavy report generation.
  llama-cpp-fast:
    image: ghcr.io/ggml-org/llama.cpp:server-rocm
    container_name: llama-cpp-fast
    networks:
      - ai-infra-net
    ports:
      - "30081:8080"
    volumes:
      - ${LLAMA_MODELS_PATH:-/path/to/your/models}:/models:ro
    environment:
      - LLAMA_ARG_MODEL=/models/${LLAMA_FAST_MODEL:-unsloth/Qwen3.5-4B-GGUF/Qwen3.5-4B-Q4_K_M.gguf}
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
      - LLAMA_ARG_CTX_SIZE=${LLAMA_FAST_CTX_SIZE:-8192}
      - LLAMA_ARG_N_GPU_LAYERS=${LLAMA_FAST_GPU_LAYERS:-99}
      - LLAMA_ARG_PARALLEL=${LLAMA_FAST_PARALLEL:-4}
      - LLAMA_ARG_CONT_BATCHING=1
      - LLAMA_ARG_FLASH_ATTN=1
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ── TEI embed: CPU inference ───────────────────────────────────────────────
  # cpu-1.8 is the CPU-only build (86-1.8 links against libcuda and won't start without GPU).
  # bge-large-en-v1.5 is ~300MB; CPU latency is 20-50ms/batch, fine for this.
  tei-embed:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8
    container_name: tei-embed
    networks:
      - ai-infra-net
    ports:
      - "30082:80"
    command: --model-id BAAI/bge-large-en-v1.5 --port 80 --auto-truncate --max-concurrent-requests 32
    volumes:
      - tei-embed-cache:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ── TEI rerank: CPU inference ──────────────────────────────────────────────
  # Cross-encoder is ~90MB — trivial on CPU.
  tei-rerank:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8
    container_name: tei-rerank
    networks:
      - ai-infra-net
    ports:
      - "30083:80"
    command: --model-id cross-encoder/ms-marco-MiniLM-L-6-v2 --port 80 --auto-truncate --max-concurrent-requests 32
    volumes:
      - tei-rerank-cache:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
